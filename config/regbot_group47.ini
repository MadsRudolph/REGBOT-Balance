# =====================================================================
# REGBOT controller gains — Group 47
# =====================================================================
#
# Source of truth: simulink/regbot_mg.m  (derived from design_task*.m)
# Matching design trace: docs/REGBOT Balance Assignment.md, §§ Task 1-4
#
# GUI controller structure (verified against rsewiki.electro.dtu.dk):
#
#   r -->[ pre_filt ]--(+)-->[Kp]-->[lead_fwd]-->[integrator]-->(Σ)-->[ post_filt_i ]-->[ out_limit ]--> u
#                       ^                                          ^
#                       |                                          |
#                 err = r - lead_back(m)                         (+uff)
#                       |                                          ^
#                  [ lead_back ](m)                          [ ff_filt ](r) * ff_kp
#
#   - Lead TF      : (tau_zero*s + 1) / (tau_pole*s + 1)   (steady-state gain = 1)
#   - Integrator   : (i_tau*s + 1) / (i_tau*s)   when i_use = 1
#   - Post integr. : (post_filt_i_tau*s + 1) / (post_filt_i_tau*s)   when
#                    post_filt_i_use = 1 AND post_filt_and_zero = 1  (our case)
#                    pure 1/(post_filt_i_tau*s)   when post_filt_and_zero = 0
#
# Balance-specific firmware behaviour (from Regbot_firmware wiki):
#   The cbal block does NOT use the generic lead_back filter for the
#   gyro-based ideal Lead. The firmware takes the y-axis gyro as a
#   SEPARATE "m-dot" input (imu2.gyroTiltRate) and uses "td" (derivative
#   time) directly — that "td" comes from lead_back_tau_zero in this
#   ini schema. lead_back_tau_pole is effectively irrelevant for cbal
#   because the firmware uses the true gyro, not a numerical derivative;
#   we leave it small (fast filter pole well above wc) for safety.
#
# To load into the REGBOT GUI:
#   1. Open each controller edit dialog (Wheel velocity, Balance,
#      Balance velocity, Balance position).
#   2. In the "Load from:" field at the top of the dialog, paste the
#      absolute path to this file, e.g.
#        C:\Users\Mads2\DTU\4. Semester\Linear Control Design\REGBOT-Balance-Assignment\config\regbot_group47.ini
#   3. Click the "Load from:" button — the dialog picks up that
#      section's values for this session.
#   4. Send to robot (normal GUI workflow).
#   5. Optional: File -> "save configuration to robot" so the values
#      persist across robot reboots.
#
# Sign convention: on the first hardware run at kp = +1.1370 the robot
# ran the wheels forward full speed and never balanced — classic
# positive-feedback runaway. The firmware Balance block does NOT absorb
# the Lecture 10 Method 2 minus sign internally; we enter it in the ini
# via negative kp. Current value kp = -1.1999 in [cbal].
#
# 2026-04-22 — Day 5 redesign: all four controllers retuned against the
# Day 5 on-floor v2 plant (Gvel = 2.198/(s+5.985)) instead of the
# original Day 4 wheels-up approximation (13.34/(s+35.71)). The biggest
# change is [cvel] kp: 3.31 -> 13.2037, making the inner loop actually
# achieve its designed 30 rad/s bandwidth on the physical robot.
# =====================================================================


# ---------------------------------------------------------------------
# Task 1 — Inner wheel-speed PI
# ---------------------------------------------------------------------
# Plant:    Gvel(s) = 2.198 / (s + 5.985)  (Day 5 v2 on-floor, training
#           wheels, 1-pole tfest fit from data/Day5_results_v2.mat).
# Specs:    wc = 30 rad/s, gamma_M >= 60 deg, Ni = 3
# Achieved: wc = 30.00, PM = 82.85 deg, GM = Inf (Day 5 redesign)
[cvel]
name = Wheel Velocity (left and right)
use = True
kp = 13.2037
i_use = 1
i_tau = 0.1000
i_limit = 1000000.0
lead_fwd_use = 0
lead_fwd_tau_zero = 1.0
lead_fwd_tau_pole = 1.0
lead_back_use = 0
lead_back_tau_zero = 1.0
lead_back_tau_pole = 1.0
pre_filt_use = 0
pre_filt_tau_zero = 1.0
pre_filt_tau_pole = 1.0
post_filt_i_use = 0
post_filt_i_tau = 1.0
post_filt_i_limit = 1000000.0
post_filt_and_zero = 1
ff_use = False
ff_kp = 0.0
ff_filt_use = 0
ff_filt_tau_zero = 1.0
ff_filt_tau_pole = 1.0
out_limit_use = True
out_limit = 8.0


# ---------------------------------------------------------------------
# Task 2 — Balance (Lecture 10 Method 2)
# ---------------------------------------------------------------------
# Plant:    Gtilt(s), 7th order, 1 RHP pole at ~+8.89 rad/s (Day 5
#           redesign; inner loop now runs at its designed wc = 30 rad/s).
# Structure: sign(-1) * C_PI,post * C_PI * (tau_d s + 1) * G_tilt
#   - Outer PI      : i_tau = titilt = 0.2000 s
#   - Post-integr.  : post_filt_i_tau = tipost = 0.1245 s  (peak at 8.03 rad/s)
#   - Gyro Lead     : lead_back_tau_zero = tdtilt = 0.0442 s
#                     (ideal Lead — filter pole >> wc for clean phase)
#   - Gain          : kp = Kptilt = 1.1999
# Specs:    wc = 15 rad/s, gamma_M = 60 deg
# Achieved: wc = 15.00, PM = 60.00 deg, GM = -5.58 dB (lower bound, P=1)
[cbal]
name = Balance
use = True
kp = -1.1999
i_use = 1
i_tau = 0.2000
i_limit = 1000000.0
lead_fwd_use = 0
lead_fwd_tau_zero = 1.0
lead_fwd_tau_pole = 1.0
lead_back_use = 1
lead_back_tau_zero = 0.0442
lead_back_tau_pole = 0.000442
pre_filt_use = 0
pre_filt_tau_zero = 1.0
pre_filt_tau_pole = 1.0
post_filt_i_use = 1
post_filt_i_tau = 0.1245
post_filt_i_limit = 1000000.0
post_filt_and_zero = 1
ff_use = False
ff_kp = 1.0
ff_filt_use = 0
ff_filt_tau_zero = 1.0
ff_filt_tau_pole = 1.0
out_limit_use = False
out_limit = 1000000.0


# ---------------------------------------------------------------------
# Task 3 — Velocity outer loop
# ---------------------------------------------------------------------
# Plant:    Gvel,outer (theta_ref -> wheel_vel, balance closed)
#           Stable after balance loop closes; RHP zero at +8.51 rad/s
#           forces wc <= z/5 ~ 1.7 rad/s.
# Structure: PI only (no Lead needed at wc = 1).
# Specs:    wc = 1 rad/s, gamma_M >= 60 deg, Ni = 3
# Achieved: wc = 1.00, PM = 68.98 deg, GM = +5.84 dB (Day 5 redesign)
[cbav]
name = Balance velocity
use = True
kp = 0.1581
i_use = 1
i_tau = 3.0000
i_limit = 1000000.0
lead_fwd_use = 0
lead_fwd_tau_zero = 1.0
lead_fwd_tau_pole = 1.0
lead_back_use = 0
lead_back_tau_zero = 1.0
lead_back_tau_pole = 1.0
pre_filt_use = 0
pre_filt_tau_zero = 1.0
pre_filt_tau_pole = 1.0
post_filt_i_use = 0
post_filt_i_tau = 1.0
post_filt_i_limit = 1000000.0
post_filt_and_zero = 1
ff_use = False
ff_kp = 1.0
ff_filt_use = 0
ff_filt_tau_zero = 1.0
ff_filt_tau_pole = 1.0
out_limit_use = False
out_limit = 1000000.0


# ---------------------------------------------------------------------
# Task 4 — Position outermost loop
# ---------------------------------------------------------------------
# Plant:    Gpos,outer (pos_ref -> x_position, balance+velocity closed)
#           Already Type-1 (free integrator v -> x), so pure P is enough
#           for zero step-tracking error. Lead dropped (improper TF;
#           Day 5 redesign wanted +2.85 deg PM boost, not worth the
#           filter-pole block).
# Specs:    wc = 0.6 rad/s
# Achieved: wc = 0.60, PM ~57 deg (after Lead drop), GM = +25 dB;
#           sim 2 m step peak v = 0.753 m/s (spec >= 0.7)
[cbap]
name = Balance position
use = True
kp = 0.5411
i_use = 0
i_tau = 1.0
i_limit = 1000000.0
lead_fwd_use = 0
lead_fwd_tau_zero = 1.0
lead_fwd_tau_pole = 1.0
lead_back_use = 0
lead_back_tau_zero = 1.0
lead_back_tau_pole = 1.0
pre_filt_use = 0
pre_filt_tau_zero = 1.0
pre_filt_tau_pole = 1.0
post_filt_i_use = 0
post_filt_i_tau = 1.0
post_filt_i_limit = 1000000.0
post_filt_and_zero = 1
ff_use = False
ff_kp = 1.0
ff_filt_use = 0
ff_filt_tau_zero = 1.0
ff_filt_tau_pole = 1.0
out_limit_use = False
out_limit = 1000000.0
